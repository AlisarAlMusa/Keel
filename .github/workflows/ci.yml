name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Type · Unit (both packages)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      # --- Backend package (keel: api + worker) ---
      - name: Sync backend
        run: uv sync --frozen
      - name: Ruff (backend)
        run: |
          uv run ruff check .
          uv run ruff format --check .
      - name: Mypy (backend)
        run: uv run mypy src scripts
      - name: Unit tests (backend)
        run: uv run pytest tests/unit -q

      # --- Model-server package (isolated) ---
      - name: Sync model-server
        working-directory: model-server
        run: uv sync --frozen
      - name: Ruff (model-server)
        working-directory: model-server
        run: uv run ruff check .
      - name: Mypy (model-server)
        working-directory: model-server
        run: uv run mypy src
      - name: Tests (model-server)
        working-directory: model-server
        run: uv run pytest -q

      # Guardrail: the lean model-server image must never pull torch.
      - name: Assert no torch in model-server lockfile
        run: |
          if grep -qi 'name = "torch"' model-server/uv.lock; then
            echo "::error::torch found in model-server lockfile (forbidden)"; exit 1
          fi

  build:
    name: Build images (api · worker · model-server)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build api image
        run: docker build -f Dockerfile.api -t keel-api:ci .
      - name: Build worker image
        run: docker build -f Dockerfile.worker -t keel-worker:ci .
      - name: Build model-server image
        run: docker build -f model-server/Dockerfile -t keel-model-server:ci ./model-server

  smoke:
    name: Stack smoke (compose up · migrate · seed · verify)
    runs-on: ubuntu-latest
    needs: [quality]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Bring up the stack
        run: docker compose up -d --build

      - name: Wait for API and model-server health
        run: |
          for svc in "http://localhost:8000/healthz" "http://localhost:9000/healthz"; do
            echo "waiting for $svc"
            for i in $(seq 1 60); do
              if curl -fsS "$svc" >/dev/null 2>&1; then echo "  up"; break; fi
              if [ "$i" = "60" ]; then echo "::error::$svc never became healthy"; docker compose logs; exit 1; fi
              sleep 3
            done
          done

      - name: Apply migrations
        run: docker compose exec -T api uv run alembic upgrade head

      - name: Seed development data
        run: docker compose exec -T api uv run python -m scripts.seed

      - name: Verify RLS policies (expect 15)
        run: |
          n=$(docker compose exec -T db psql -U keel_app -d keel -tAc \
            "SELECT count(*) FROM pg_policies WHERE policyname='tenant_isolation'")
          echo "tenant_isolation policies: $n"
          test "$n" = "15"

      - name: Run integration tests against the stack DB
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://keel_app:keel_local_pw@localhost:5432/keel
        run: |
          uv sync --frozen
          uv run pytest tests/integration -q

      - name: Tear down
        if: always()
        run: docker compose down -v
