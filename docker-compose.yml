# Keel local stack — one command brings up all eight services.
#   docker compose up -d --build
#
# Credentials are loaded from .env (gitignored). Copy .env.example → .env
# and fill in values before running. Local-only dev values; production
# resolves everything from a real Vault cluster.

name: keel

x-app-env: &app-env
  KEEL_ENV: ${KEEL_ENV}
  KEEL_LOG_LEVEL: ${KEEL_LOG_LEVEL}
  KEEL_LOG_FILE: ${KEEL_LOG_FILE:-/var/log/keel/app.json}
  DATABASE_URL: ${DATABASE_URL}
  REDIS_URL: ${REDIS_URL}
  MINIO_ENDPOINT: ${MINIO_ENDPOINT}
  MINIO_BUCKET: ${MINIO_BUCKET}
  MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
  # Defaults to the in-stack Jaeger collector so traces flow with no .env change.
  OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://jaeger:4317}
  OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-keel-api}
  LANGSMITH_TRACING: ${LANGSMITH_TRACING}
  MODEL_SERVER_URL: ${MODEL_SERVER_URL}
  VAULT_ADDR: ${VAULT_ADDR}
  VAULT_TOKEN: ${VAULT_TOKEN}
  VAULT_KV_MOUNT: ${VAULT_KV_MOUNT}
  VAULT_SECRET_PATH: ${VAULT_SECRET_PATH}
  # LLM model names (non-secret; hardcoded — not overridable via .env to avoid confusion)
  # gemini-3.1-flash-lite = 500 RPD free tier (primary)
  # gemini-2.5-flash = 20 RPD free tier — DO NOT USE as primary
  GEMINI_MODEL: gemini-3.1-flash-lite
  GEMINI_FALLBACK_MODELS: '["gemini-3-flash","gemini-2.5-flash-lite"]'
  GEMINI_LITE_MODEL: gemini-3.1-flash-lite
  # RAG knobs
  EMBED_MODEL: ${EMBED_MODEL:-embed-multilingual-v3.0}
  EMBED_DIM: ${EMBED_DIM:-1024}
  RERANK_MODEL: ${RERANK_MODEL:-rerank-multilingual-v3.0}
  DENSE_K: ${DENSE_K:-20}
  SPARSE_K: ${SPARSE_K:-20}
  RRF_K: ${RRF_K:-60}
  RERANK_TOP_N: ${RERANK_TOP_N:-5}
  SESSION_TTL_SECONDS: ${SESSION_TTL_SECONDS:-1800}
  # Phase 5 addendum: demo passwords (Vault is the authoritative source at runtime)
  KEEL_OPERATOR_PASSWORD: ${KEEL_OPERATOR_PASSWORD:-123}
  KEEL_ADMIN_PASSWORD: ${KEEL_ADMIN_PASSWORD:-123}
  KEEL_PORTAL_PASSWORD: ${KEEL_PORTAL_PASSWORD:-123}
  # G4 email: simulated by default; set KEEL_SMTP_ENABLED=true + creds in .env to send.
  KEEL_EMAIL_ENABLED: ${KEEL_EMAIL_ENABLED:-true}
  KEEL_EMAIL_SIMULATE_TO: ${KEEL_EMAIL_SIMULATE_TO:-mousaelisar@gmail.com}
  KEEL_SMTP_ENABLED: ${KEEL_SMTP_ENABLED:-false}
  KEEL_SMTP_HOST: ${KEEL_SMTP_HOST:-}
  KEEL_SMTP_PORT: ${KEEL_SMTP_PORT:-587}
  KEEL_SMTP_USER: ${KEEL_SMTP_USER:-}
  KEEL_SMTP_PASSWORD: ${KEEL_SMTP_PASSWORD:-}
  KEEL_EMAIL_FROM: ${KEEL_EMAIL_FROM:-noreply@keel.local}

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      KEEL_APP_PASSWORD: ${KEEL_APP_PASSWORD}
    ports:
      - "5432:5432"   # exposed for local dev + migration tests
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./scripts/db-init.sh:/docker-entrypoint-initdb.d/db-init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d keel"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [keel]

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [keel]

  # Tracing backend. All-in-one Jaeger: receives OTLP (gRPC 4317) from api +
  # worker and serves the trace UI at http://localhost:16686. No persistence
  # (in-memory) — this is local dev observability, not a prod store.
  jaeger:
    image: jaegertracing/all-in-one:1.60
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC (exposed for local debugging)
    networks: [keel]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9001:9001"   # console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [keel]

  vault:
    image: hashicorp/vault:1.18
    cap_add: [IPC_LOCK]
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_TOKEN}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_ADDR: http://127.0.0.1:8200
      VAULT_TOKEN: ${VAULT_TOKEN}
    command: server -dev
    ports:
      - "8200:8200"
    healthcheck:
      test: ["CMD-SHELL", "vault status -address=http://127.0.0.1:8200 >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [keel]

  # One-shot: seed the dev secrets the app requires, then exit. The app waits
  # for this to complete successfully (so it never boots before secrets exist).
  vault-init:
    image: hashicorp/vault:1.18
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: ${VAULT_ADDR}
      VAULT_TOKEN: ${VAULT_TOKEN}
      KEEL_APP_PASSWORD: ${KEEL_APP_PASSWORD}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      KEEL_JWT_SIGNING_KEY: ${KEEL_JWT_SIGNING_KEY}
      KEEL_WIDGET_TOKEN_SECRET: ${KEEL_WIDGET_TOKEN_SECRET}
      # Phase 5: shared secret for portal→keel service-to-service auth (D-P5-005).
      # Kept as a legacy fallback; per-portal secrets below (G2) are preferred.
      KEEL_PORTAL_SERVICE_SECRET: ${KEEL_PORTAL_SERVICE_SECRET}
      # G2: per-portal service secrets — each portal can mint only its own tenant.
      KEEL_PORTAL_SERVICE_SECRET_NORTHANE: ${KEEL_PORTAL_SERVICE_SECRET_NORTHANE:-${KEEL_PORTAL_SERVICE_SECRET}}
      KEEL_PORTAL_SERVICE_SECRET_SUMMIT: ${KEEL_PORTAL_SERVICE_SECRET_SUMMIT:-${KEEL_PORTAL_SERVICE_SECRET}}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      COHERE_API_KEY: ${COHERE_API_KEY}
      # Phase 5 addendum: operator / admin / portal demo passwords
      KEEL_OPERATOR_PASSWORD: ${KEEL_OPERATOR_PASSWORD:-123}
      KEEL_ADMIN_PASSWORD: ${KEEL_ADMIN_PASSWORD:-123}
      KEEL_PORTAL_PASSWORD: ${KEEL_PORTAL_PASSWORD:-123}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        vault kv put secret/keel/app \
          db_password=$KEEL_APP_PASSWORD \
          minio_access_key=$MINIO_ROOT_USER \
          minio_secret_key=$MINIO_ROOT_PASSWORD \
          jwt_signing_key=$KEEL_JWT_SIGNING_KEY \
          widget_token_secret=$KEEL_WIDGET_TOKEN_SECRET \
          portal_service_secret=$KEEL_PORTAL_SERVICE_SECRET \
          portal_service_secret_northane=$KEEL_PORTAL_SERVICE_SECRET_NORTHANE \
          portal_service_secret_summit=$KEEL_PORTAL_SERVICE_SECRET_SUMMIT \
          gemini_api_key=$GEMINI_API_KEY \
          cohere_api_key=$COHERE_API_KEY \
          keel_operator_password=$KEEL_OPERATOR_PASSWORD \
          keel_admin_password=$KEEL_ADMIN_PASSWORD \
          keel_portal_password=$KEEL_PORTAL_PASSWORD
    networks: [keel]

  # One-shot: create the MinIO buckets MLflow + the app need, then exit.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MLFLOW_BUCKET: ${MLFLOW_BUCKET}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mc alias set local http://minio:9000 $MINIO_ROOT_USER $MINIO_ROOT_PASSWORD &&
        mc mb --ignore-existing local/$MINIO_BUCKET &&
        mc mb --ignore-existing local/$MLFLOW_BUCKET
    networks: [keel]

  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    # Backend store = Postgres (metadata + model registry).
    # Artifacts = MinIO via S3; --serve-artifacts proxies uploads through this
    # server, so remote clients (e.g. Colab) need no MinIO credentials.
    command: >
      mlflow server --host 0.0.0.0 --port 5000
      --backend-store-uri postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/mlflow
      --artifacts-destination s3://${MLFLOW_BUCKET}
      --serve-artifacts
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_DEFAULT_REGION: us-east-1
    ports:
      - "5001:5000"   # host 5001 (macOS AirPlay Receiver commonly holds 5000)
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [keel]

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment: *app-env
    ports:
      - "8000:8000"
    volumes:
      - keel-logs:/var/log/keel
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      vault:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
      jaeger:
        condition: service_started
    networks: [keel]

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment: *app-env
    volumes:
      - keel-logs:/var/log/keel
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
      jaeger:
        condition: service_started
    networks: [keel]

  # One-shot: pull the current production model artifacts (grad-risk + intent)
  # from MLflow into the shared model-artifacts volume, then exit. model-server
  # waits for this. Hostnames are in-network (this container only runs inside the
  # compose network) — host-facing ${MLFLOW_TRACKING_URI} (localhost:5001) is for
  # running the pull script from the Mac, not here.
  model-artifacts-sync:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: ["python", "scripts/pull_model_artifacts.py", "--dest", "/app/ml", "--allow-missing"]
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_DEFAULT_REGION: us-east-1
    volumes:
      - model-artifacts:/app/ml
    depends_on:
      mlflow:
        condition: service_healthy
    networks: [keel]

  model-server:
    build:
      context: ./model-server
      dockerfile: Dockerfile
    environment:
      GRAD_RISK_ARTIFACTS_DIR: /app/ml/grad_risk/artifacts
      INTENT_ARTIFACTS_DIR: /app/ml/intent/artifacts
    ports:
      - "9000:9000"
    volumes:
      - model-artifacts:/app/ml
    depends_on:
      model-artifacts-sync:
        condition: service_completed_successfully
    networks: [keel]

  # Mock SIS portals — one image, two instances (spec §S9, D-P5-001, D-P5-002).
  # Same Dockerfile, different env (PORTAL_TENANT, PORT, branding, widget snippet).
  # Two origins make the Keel origin-check + cross-tenant story demonstrable.

  # ── Northane portal (:3001) ───────────────────────────────────────────────
  portal-northane:
    build:
      context: ./frontend
      dockerfile: portal/Dockerfile
      args:
        VITE_UNIVERSITY_NAME: "Northane University"
        VITE_UNIVERSITY_INITIAL: "N"
        VITE_KEEL_API_URL: "http://localhost:8000"
    environment:
      PORT: "3001"
      PORTAL_TENANT: "northane"
      DATABASE_URL: "postgresql://keel_app:${KEEL_APP_PASSWORD}@db:5432/keel"
      KEEL_API_URL: "http://api:8000"
      # G2: this portal presents its own per-tenant secret (falls back to shared).
      PORTAL_SERVICE_SECRET: ${KEEL_PORTAL_SERVICE_SECRET_NORTHANE:-${KEEL_PORTAL_SERVICE_SECRET}}
      SESSION_SECRET: ${KEEL_JWT_SIGNING_KEY}
      NODE_ENV: production
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [keel]

  # ── Summit portal (:3002) ─────────────────────────────────────────────────
  portal-summit:
    build:
      context: ./frontend
      dockerfile: portal/Dockerfile
      args:
        VITE_UNIVERSITY_NAME: "Summit College"
        VITE_UNIVERSITY_INITIAL: "S"
        VITE_KEEL_API_URL: "http://localhost:8000"
    environment:
      PORT: "3002"
      PORTAL_TENANT: "summit"
      DATABASE_URL: "postgresql://keel_app:${KEEL_APP_PASSWORD}@db:5432/keel"
      KEEL_API_URL: "http://api:8000"
      # G2: this portal presents its own per-tenant secret (falls back to shared).
      PORTAL_SERVICE_SECRET: ${KEEL_PORTAL_SERVICE_SECRET_SUMMIT:-${KEEL_PORTAL_SERVICE_SECRET}}
      SESSION_SECRET: ${KEEL_JWT_SIGNING_KEY}
      NODE_ENV: production
    ports:
      - "3002:3002"
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3002/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [keel]

volumes:
  db-data:
  minio-data:
  model-artifacts:
  keel-logs:   # JSON logs from api + worker; survives restarts (ENGINEERING_RULES §8)
  # MLflow no longer needs a volume — metadata lives in Postgres, artifacts in MinIO.

networks:
  keel:
    driver: bridge
