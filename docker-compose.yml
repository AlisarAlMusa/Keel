# Keel local stack — one command brings up all eight services.
#   docker compose up -d --build
#
# Credentials are loaded from .env (gitignored). Copy .env.example → .env
# and fill in values before running. Local-only dev values; production
# resolves everything from a real Vault cluster.

name: keel

x-app-env: &app-env
  KEEL_ENV: ${KEEL_ENV}
  KEEL_LOG_LEVEL: ${KEEL_LOG_LEVEL}
  DATABASE_URL: ${DATABASE_URL}
  REDIS_URL: ${REDIS_URL}
  MINIO_ENDPOINT: ${MINIO_ENDPOINT}
  MINIO_BUCKET: ${MINIO_BUCKET}
  MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
  OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
  OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME}
  LANGSMITH_TRACING: ${LANGSMITH_TRACING}
  MODEL_SERVER_URL: ${MODEL_SERVER_URL}
  VAULT_ADDR: ${VAULT_ADDR}
  VAULT_TOKEN: ${VAULT_TOKEN}
  VAULT_KV_MOUNT: ${VAULT_KV_MOUNT}
  VAULT_SECRET_PATH: ${VAULT_SECRET_PATH}

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      KEEL_APP_PASSWORD: ${KEEL_APP_PASSWORD}
    ports:
      - "5432:5432"   # exposed for local dev + migration tests
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./scripts/db-init.sh:/docker-entrypoint-initdb.d/db-init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d keel"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [keel]

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [keel]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9001:9001"   # console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [keel]

  vault:
    image: hashicorp/vault:1.18
    cap_add: [IPC_LOCK]
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_TOKEN}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_ADDR: http://127.0.0.1:8200
      VAULT_TOKEN: ${VAULT_TOKEN}
    command: server -dev
    ports:
      - "8200:8200"
    healthcheck:
      test: ["CMD-SHELL", "vault status -address=http://127.0.0.1:8200 >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [keel]

  # One-shot: seed the dev secrets the app requires, then exit. The app waits
  # for this to complete successfully (so it never boots before secrets exist).
  vault-init:
    image: hashicorp/vault:1.18
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: ${VAULT_ADDR}
      VAULT_TOKEN: ${VAULT_TOKEN}
      KEEL_APP_PASSWORD: ${KEEL_APP_PASSWORD}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      KEEL_JWT_SIGNING_KEY: ${KEEL_JWT_SIGNING_KEY}
      KEEL_WIDGET_TOKEN_SECRET: ${KEEL_WIDGET_TOKEN_SECRET}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        vault kv put secret/keel/app \
          db_password=$KEEL_APP_PASSWORD \
          minio_access_key=$MINIO_ROOT_USER \
          minio_secret_key=$MINIO_ROOT_PASSWORD \
          jwt_signing_key=$KEEL_JWT_SIGNING_KEY \
          widget_token_secret=$KEEL_WIDGET_TOKEN_SECRET
    networks: [keel]

  # One-shot: create the MinIO buckets MLflow + the app need, then exit.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MLFLOW_BUCKET: ${MLFLOW_BUCKET}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mc alias set local http://minio:9000 $MINIO_ROOT_USER $MINIO_ROOT_PASSWORD &&
        mc mb --ignore-existing local/$MINIO_BUCKET &&
        mc mb --ignore-existing local/$MLFLOW_BUCKET
    networks: [keel]

  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    # Backend store = Postgres (metadata + model registry).
    # Artifacts = MinIO via S3; --serve-artifacts proxies uploads through this
    # server, so remote clients (e.g. Colab) need no MinIO credentials.
    command: >
      mlflow server --host 0.0.0.0 --port 5000
      --backend-store-uri postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/mlflow
      --artifacts-destination s3://${MLFLOW_BUCKET}
      --serve-artifacts
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_DEFAULT_REGION: us-east-1
    ports:
      - "5001:5000"   # host 5001 (macOS AirPlay Receiver commonly holds 5000)
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [keel]

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment: *app-env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      vault:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
    networks: [keel]

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment: *app-env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
    networks: [keel]

  model-server:
    build:
      context: ./model-server
      dockerfile: Dockerfile
    ports:
      - "9000:9000"
    networks: [keel]

volumes:
  db-data:
  minio-data:
  # MLflow no longer needs a volume — metadata lives in Postgres, artifacts in MinIO.

networks:
  keel:
    driver: bridge
